<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>WordOwl 🦉 — учим английские слова</title>
  <meta name="description" content="Умная мини-игра для изучения английских слов с интервальным повторением (FSRS), картинками и озвучкой." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦉</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header id="topbar"></header>
  <main id="app"></main>
  <script type="module" src="js/app.js"></script>
  <script>
    // Network-first service worker: a normal page refresh always loads the
    // latest deployed version (no private windows / hard-reload needed),
    // and the app still works offline from cache.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
  <noscript>Для работы приложения нужен включённый JavaScript.</noscript>
</body>
</html>
